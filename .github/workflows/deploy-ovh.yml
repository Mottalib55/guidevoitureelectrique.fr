name: Deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster129.hosting.ovh.net
          username: ${{ secrets.OVH_FTP_USER }}
          password: ${{ secrets.OVH_FTP_PASS }}
          local-dir: ./out/
          server-dir: ./www/
          dangerous-clean-slate: false

      - name: Submit to Bing IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"guidevoitureelectrique.fr\",\"key\":\"${{ secrets.BING_API_KEY }}\",\"keyLocation\":\"https://guidevoitureelectrique.fr/${{ secrets.BING_API_KEY }}.txt\",\"urlList\":[\"https://guidevoitureelectrique.fr/\"]}" \
            || true
